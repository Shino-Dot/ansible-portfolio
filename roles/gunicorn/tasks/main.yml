---
- name: Install git
  dnf:
    name: git
    state: present

- name: Install python3-pip
  dnf:
    name: python3-pip
    state: present

- name: Clone Django app
  git:
    repo: https://github.com/amamiya-works/albatross-tester
    dest: /home/shino/albatross-tester
    force: yes

- name: Install pip packages in virtualenv
  pip:
    requirements: /home/shino/albatross-tester/requirements.txt
    virtualenv: /home/shino/albatross-tester/venv
    virtualenv-command: python3 -m venv

- name: Set ALLOWED_HOSTS
  lineinfile:
    path: /home/shino/albatross-tester/albatross/settings.py
    regexp: 'ALLOWED_HOSTS'
    line: 'ALLOWED_HOSTS = ["*"]'

- name: Run migrations
  command:
    cmd: /home/shino/albatross-tester/venv/bin/python namage.py migrate
    chdir: /home/shino/albatross-tester

- name: Set SELinux context for venv
  command:
    cmd: chcon -R -t bin_t /home/shino/albatross-tester/venv/

- name: Copy gunicorn service file
  copy:
    src: gunicorn.service
    dest: /etc/systemd/system/gunicorn.service
    owner: root
    group: root
    mode: '0644'

- name: Enable and start gunicorn
  systemd:
    name: gunicorn
    enabled: yes
    state: started
    daemon_reload: yes
    